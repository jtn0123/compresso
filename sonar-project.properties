sonar.projectKey=jtn0123_compresso
sonar.organization=jtn0123ismysonar

# Source directories
sonar.sources=compresso/
sonar.tests=tests/

# Test file patterns
sonar.test.inclusions=**/test_*.py,**/tests/**

# Exclusions (generated/vendored/build artifacts)
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/build/**,compresso/webserver/frontend/public/**

# Python coverage (unit shards + integration)
sonar.python.coverage.reportPaths=coverage-shard-1.xml,coverage-shard-2.xml,coverage-shard-3.xml,integration-coverage.xml

# JavaScript/Vue coverage
sonar.javascript.lcov.reportPaths=lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8
