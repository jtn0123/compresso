sonar.projectKey=jtn0123_compresso
sonar.organization=jtn0123ismysonar

# Source directories
sonar.sources=compresso/
sonar.tests=tests/

# Test file patterns
sonar.test.inclusions=**/test_*.py,**/tests/**

# Exclusions (generated/vendored/build artifacts + frontend)
# Frontend is excluded because it has its own quality pipeline (ESLint
# vue3-strongly-recommended + Prettier + Vitest 396 tests + DOMPurify).
# SonarCloud's static analysis cannot trace DOMPurify sanitization on
# v-html directives, producing false-positive security hotspots.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/build/**,compresso/webserver/frontend/**

# Python coverage (unit test shards from the same workflow)
# NOTE: integration-coverage.xml and lcov.info are produced by other workflows
# and cannot be consumed here due to cross-workflow artifact limitations.
# To include them, consolidate all test jobs into a single workflow.
sonar.python.coverage.reportPaths=coverage-shard-1.xml,coverage-shard-2.xml,coverage-shard-3.xml

# JavaScript/Vue coverage (when available in same workflow)
# sonar.javascript.lcov.reportPaths=lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8
