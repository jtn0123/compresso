name: Build Docker Base Image

on:
  push:
    branches: [master]
    paths:
      - 'docker/Dockerfile.base'
      - 'requirements.txt'
      - '.github/workflows/docker_base_image.yml'
  schedule:
    # Weekly on Saturday at 03:00 UTC (after the main CI schedule)
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_base_amd64:
    name: Build base image (amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 base
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: docker/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/compresso-base:amd64
          cache-from: type=gha,scope=base-amd64
          cache-to: type=gha,scope=base-amd64,mode=max

  build_base_arm64:
    name: Build base image (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 base
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: docker/Dockerfile.base
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/compresso-base:arm64
          cache-from: type=gha,scope=base-arm64
          cache-to: type=gha,scope=base-arm64,mode=max

  create_manifest:
    name: Create multi-arch base manifest
    needs: [build_base_amd64, build_base_arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Log into GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/compresso-base"
          DATE_TAG="$(date -u +'%Y%m%d')"
          RUN_TAG="${DATE_TAG}-${GITHUB_RUN_NUMBER}"
          docker buildx imagetools create \
            -t "${GHCR_BASE}:latest" \
            -t "${GHCR_BASE}:${DATE_TAG}" \
            -t "${GHCR_BASE}:${RUN_TAG}" \
            "${GHCR_BASE}:amd64" \
            "${GHCR_BASE}:arm64"

      - name: Print new digest
        run: |
          # Print the new digest so it can be pinned in docker/Dockerfile
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/compresso-base"
          docker buildx imagetools inspect "${GHCR_BASE}:latest" \
            | head -3
