name: SonarCloud Analysis

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - staging

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonar-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: []
    # Run even if tests failed — we still want the scan
    if: always()

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history needed for blame/new code detection

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Run tests with coverage
      run: |
        pytest tests/unit -q --splits 1 --group 1 \
          --cov=compresso --cov-report=xml:coverage.xml || true

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.python.coverage.reportPaths=coverage.xml
