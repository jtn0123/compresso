name: Python Lint & Run Unit Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'master'
      - 'staging'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  py_lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Audit dependencies for known vulnerabilities
      run: |
        pip install pip-audit
        # Audit the fully-resolved lockfiles so transitive dependencies are
        # covered, not just the direct deps in the *.txt files.
        pip-audit -r requirements.lock
        pip-audit -r requirements-dev.lock

    - name: Clean local build artifacts
      run: |
        rm -rf build dist

    - name: Lint with ruff
      run: |
        # Fatal: syntax errors and undefined names (blocking)
        ruff check --select E9,F63,F7,F82 compresso/ tests/
        # Full lint (blocking — all rules enforced)
        ruff check compresso/ tests/

    - name: Check formatting with ruff
      run: |
        ruff format --check compresso/ tests/

    - name: Type check with mypy
      run: |
        mypy compresso/ --ignore-missing-imports --no-error-summary

  py_unit_test:
    name: Unit Tests (${{ matrix.os }}, shard ${{ matrix.shard }}/3)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Clean local build artifacts
      shell: bash
      run: |
        rm -rf build dist

    - name: Test with pytest
      shell: bash
      env:
        # Write a per-shard coverage data file so the summary job can combine
        # them into a single coverage figure (XML reports cannot be combined).
        COVERAGE_FILE: .coverage.${{ matrix.os }}.${{ matrix.shard }}
      run: |
        pytest tests/unit -q --splits 3 --group ${{ matrix.shard }} \
          --cov=compresso --cov-report=xml:coverage-shard-${{ matrix.shard }}.xml \
          --cov-fail-under=0

    - name: Upload shard coverage
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-${{ matrix.os }}-shard-${{ matrix.shard }}
        path: |
          coverage-shard-${{ matrix.shard }}.xml
          .coverage.${{ matrix.os }}.${{ matrix.shard }}
        # .coverage.* are hidden files, which upload-artifact excludes by default.
        include-hidden-files: true
        retention-days: 30

  coverage_report:
    name: Coverage Summary
    needs: py_unit_test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install coverage
      run: pip install coverage

    - name: Download shard coverage
      uses: actions/download-artifact@v8
      with:
        pattern: coverage-*
        merge-multiple: true

    - name: Combine and report coverage
      run: |
        # Combine the per-shard .coverage data files into one dataset.
        coverage combine
        coverage xml -o coverage.xml
        # Print the report and enforce the project coverage gate (fail_under=75).
        coverage report --show-missing --fail-under=75

    - name: Upload combined coverage
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          coverage.xml
          coverage-shard-*.xml
        retention-days: 30

  sonarcloud:
    name: SonarCloud Scan
    needs: [py_unit_test]
    runs-on: ubuntu-latest
    # Dependabot PRs cannot access repository secrets such as SONAR_TOKEN.
    if: always() && github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history for blame/new code detection

    - name: Download unit test coverage
      uses: actions/download-artifact@v8
      with:
        pattern: coverage-ubuntu-*
        merge-multiple: true
      continue-on-error: true

    - name: List coverage files
      run: ls -la coverage*.xml lcov.info 2>/dev/null || echo "No coverage files found"

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v7
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
