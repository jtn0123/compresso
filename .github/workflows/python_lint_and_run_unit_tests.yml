name: Python Lint & Run Unit Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'master'
      - 'staging'

permissions:
  contents: read

jobs:
  py_lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Restore python cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Audit dependencies for known vulnerabilities
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt

    - name: Clean local build artifacts
      run: |
        rm -rf build dist

    - name: Lint with ruff
      run: |
        # Fatal: syntax errors and undefined names (blocking)
        ruff check --select E9,F63,F7,F82 compresso/ tests/
        # Full lint (blocking — all rules enforced)
        ruff check compresso/ tests/

    - name: Type check with mypy
      run: |
        mypy compresso/webserver/websocket.py compresso/webserver/api_v2/base_api_handler.py compresso/webserver/api_v2/system_api.py compresso/libs/system.py --ignore-missing-imports --follow-imports=silent --no-error-summary
        mypy compresso/ --ignore-missing-imports --no-error-summary 2>&1 || true

  py_unit_test:
    name: Unit Tests (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Restore python cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Clean local build artifacts
      run: |
        rm -rf build dist

    - name: Test with pytest
      run: |
        pytest tests/unit -q --splits 3 --group ${{ matrix.shard }} \
          --cov=compresso --cov-report=xml:coverage-shard-${{ matrix.shard }}.xml

    - name: Upload shard coverage
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-shard-${{ matrix.shard }}
        path: coverage-shard-${{ matrix.shard }}.xml
        retention-days: 30

  coverage_report:
    name: Coverage Summary
    needs: py_unit_test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install coverage
      run: pip install coverage

    - name: Download shard coverage
      uses: actions/download-artifact@v8
      with:
        pattern: coverage-shard-*
        merge-multiple: true

    - name: Combine and report coverage
      run: |
        coverage combine --data-file=.coverage coverage-shard-*.xml 2>/dev/null || true
        coverage report --format=total 2>/dev/null || echo "Coverage combine not supported with XML; see individual shard reports."

    - name: Upload combined coverage
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage-shard-*.xml
        retention-days: 30
