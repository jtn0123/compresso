name: Python Lint & Run Unit Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'master'
      - 'staging'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  py_lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Audit dependencies for known vulnerabilities
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt

    - name: Clean local build artifacts
      run: |
        rm -rf build dist

    - name: Lint with ruff
      run: |
        # Fatal: syntax errors and undefined names (blocking)
        ruff check --select E9,F63,F7,F82 compresso/ tests/
        # Full lint (blocking — all rules enforced)
        ruff check compresso/ tests/

    - name: Check formatting with ruff
      run: |
        ruff format --check compresso/ tests/

    - name: Type check with mypy
      run: |
        mypy compresso/ --ignore-missing-imports --no-error-summary

  py_unit_test:
    name: Unit Tests (${{ matrix.os }}, shard ${{ matrix.shard }}/3)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Clean local build artifacts
      shell: bash
      run: |
        rm -rf build dist

    - name: Test with pytest
      shell: bash
      run: |
        pytest tests/unit -q --splits 3 --group ${{ matrix.shard }} \
          --cov=compresso --cov-report=xml:coverage-shard-${{ matrix.shard }}.xml \
          --cov-fail-under=0

    - name: Upload shard coverage
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-${{ matrix.os }}-shard-${{ matrix.shard }}
        path: coverage-shard-${{ matrix.shard }}.xml
        retention-days: 30

  coverage_report:
    name: Coverage Summary
    needs: py_unit_test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install coverage
      run: pip install coverage

    - name: Download shard coverage
      uses: actions/download-artifact@v8
      with:
        pattern: coverage-*
        merge-multiple: true

    - name: Combine and report coverage
      run: |
        coverage combine --data-file=.coverage coverage-shard-*.xml 2>/dev/null || true
        coverage report --format=total 2>/dev/null || echo "Coverage combine not supported with XML; see individual shard reports."

    - name: Upload combined coverage
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage-shard-*.xml
        retention-days: 30

  sonarcloud:
    name: SonarCloud Scan
    needs: [py_unit_test]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history for blame/new code detection

    - name: Download unit test coverage
      uses: actions/download-artifact@v8
      with:
        pattern: coverage-ubuntu-*
        merge-multiple: true
      continue-on-error: true

    - name: List coverage files
      run: ls -la coverage*.xml lcov.info 2>/dev/null || echo "No coverage files found"

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
