name: Python Lint & Run Unit Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'master'
      - 'staging'

jobs:
  py_lint_and_unit_test:

    name: Lint & Run Unit Tests Using Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    # Setup python environment
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    # Restore the python cache if it exists
    - name: Restore python cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Install dependencies for testing compresso
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

    - name: Clean local build artifacts
      run: |
        rm -rf build dist

    - name: Lint with ruff
      run: |
        pip install ruff
        # Fatal: syntax errors and undefined names (blocking)
        ruff check --select E9,F63,F7,F82 compresso/
        # Full lint (blocking — all rules enforced)
        ruff check compresso/

    - name: Type check with mypy
      if: matrix.python-version == '3.12'
      run: |
        mypy compresso/ --ignore-missing-imports --no-error-summary 2>&1 || true

    - name: Test with pytest
      run: |
        pytest tests/unit -q --cov=compresso --cov-report=term-missing --cov-report=xml:coverage.xml

    - name: Upload coverage report
      if: matrix.python-version == '3.12' && github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 30

    - name: Coverage summary
      if: matrix.python-version == '3.12'
      run: |
        python -m coverage report --format=total 2>/dev/null || python -m coverage report | tail -1
