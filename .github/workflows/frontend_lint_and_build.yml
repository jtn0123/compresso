name: Frontend Lint & Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "master"
      - "staging"
  workflow_call:
    inputs:
      checkout_ref:
        description: Exact commit to validate for a release candidate
        required: true
        type: string

permissions:
  contents: read

jobs:
  frontend_lint_and_build:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: compresso/webserver/frontend

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.checkout_ref || github.sha }}

    - name: Set up Node 24
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: "npm"
        cache-dependency-path: compresso/webserver/frontend/package-lock.json

    - name: Set up Python 3.13
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: "3.13"

    - name: Install backend runtime dependencies
      run: python -m pip install --require-hashes -r ../../../requirements.lock

    - name: Install dependencies
      run: npm ci

    - name: Install locked release tooling
      working-directory: .github/release
      run: npm ci

    - name: Test release candidate tooling
      working-directory: .github/release
      run: npm test

    - name: Run tests with coverage
      run: npx vitest run --coverage

    - name: Upload frontend coverage
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage
        path: compresso/webserver/frontend/coverage/lcov.info
        retention-days: 30

    - name: Check formatting with prettier
      run: npx prettier --check "src/**/*.{js,vue}"

    - name: Lint frontend
      run: npm run lint

    - name: Build frontend
      run: npm run build:publish

    - name: Verify built frontend assets
      run: |
        test -f dist/spa/index.html

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Run mocked Playwright smoke tests
      run: npm run test:e2e:run

    - name: Run live-backend Playwright smoke tests
      run: PYTHON_BIN=python npm run test:e2e:live:run

    - name: Audit direct production dependencies
      run: |
        npm audit --omit=dev
