name: Frontend Lint & Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "master"
      - "staging"

permissions:
  contents: read

jobs:
  frontend_lint_and_build:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: compresso/webserver/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node 24
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: "npm"
        cache-dependency-path: compresso/webserver/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests with coverage
      run: npx vitest run --coverage

    - name: Upload frontend coverage
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage
        path: compresso/webserver/frontend/coverage/lcov.info
        retention-days: 30

    - name: Lint frontend
      run: npm run lint

    - name: Build frontend
      run: npm run build:publish

    - name: Verify built frontend assets
      run: |
        test -f dist/spa/index.html

    - name: Audit direct production dependencies
      run: |
        npm audit --omit=dev
