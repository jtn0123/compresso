name: Verify Local Parity

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
      - "staging"
    paths:
      - "scripts/verify-local.sh"
      - ".github/workflows/verify-local.yml"
      - "requirements*.txt"
      - "requirements.lock"
      - "pyproject.toml"
      - "compresso/webserver/frontend/**"

permissions:
  contents: read

jobs:
  verify_local:
    name: Run verify-local.sh
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: compresso/webserver/frontend/package-lock.json

      - name: Run local verification script
        run: bash scripts/verify-local.sh
