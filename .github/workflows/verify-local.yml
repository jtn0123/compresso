name: Verify Local Parity

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
      - "staging"
    paths:
      - "scripts/verify-local.sh"
      - "scripts/check-action-pins.sh"
      - "scripts/check-license-consistency.sh"
      - ".github/workflows/**"
      - ".github/workflows/verify-local.yml"
      - "requirements*.txt"
      - "requirements*.lock"
      - "pyproject.toml"
      - "LICENSE"
      - "LICENSES/**"
      - "THIRD_PARTY_NOTICES.md"
      - "docs/LICENSING.md"
      - "compresso/webserver/frontend/**"

permissions:
  contents: read

jobs:
  verify_local:
    name: Run verify-local.sh
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-dev.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.lock

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: compresso/webserver/frontend/package-lock.json

      - name: Run local verification script
        run: bash scripts/verify-local.sh full
