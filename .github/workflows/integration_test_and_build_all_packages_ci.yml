name: Build All Packages CI

on:
  push:
    branches: ["dev-**", "pr-**", "staging", "master"]
    tags: ["**"]
  pull_request:
    branches: ["staging", "master"]
  schedule:
    # At 02:30 on Saturday
    - cron: "30 2 * * 6"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration_tests:
    name: Run integration tests
    runs-on: ubuntu-latest

    steps:
      # Fetch shallow git repository
      - uses: actions/checkout@v4

      # Restore test video's cache
      - name: Restore test videos cache
        uses: actions/cache@v5
        id: test_videos_cache
        with:
          path: tests/support_/videos
          key: ${{ runner.os }}-test_videos-${{ hashFiles('tests/scripts_/download_test_files.sh') }}
          restore-keys: |
            ${{ runner.os }}-test_videos-

      # Download any missing test videos
      - name: Download any missing test videos
        if: success() && steps.test_videos_cache.outputs.cache-hit != 'true'
        run: |
          bash -c "tests/scripts_/download_test_files.sh"

      # Setup python environment
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # Restore the python cache if it exists
      - name: Restore python cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Restore the apt cache if it exists
      - name: Restore apt cache
        id: apt-cache
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-cache-ffmpeg

      # Download FFMPEG
      - name: Download FFMPEG
        if: success()
        run: |
          [[ ! -z `sudo find /var/cache/apt/archives -type f -name "ffmpeg*.deb"` ]] && echo "no update" || sudo apt-get update
          sudo apt-get install -yq --no-install-recommends --download-only ffmpeg

      # Install FFMPEG
      - name: Install FFMPEG
        if: success()
        run: |
          sudo apt-get install -yq --no-install-recommends ffmpeg

      # Install python dependencies for testing compresso
      - name: Install python dependencies
        if: success()
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      # Run pytest unit tests
      - name: Test with pytest
        if: success()
        run: |
          echo "Using test videos:"
          ls -l ./tests/support_/videos/*/
          pytest -m integrationtest

  frontend_reproducibility:
    name: Verify frontend reproducibility
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: compresso/webserver/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: compresso/webserver/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build:publish

  py_build:
    name: Build Python package from clean checkout
    needs:
      - frontend_reproducibility
    runs-on: ubuntu-latest

    steps:
      # Fetch full git repository
      - name: Checkout project
        uses: actions/checkout@v4

      # Checkout tags
      - name: Fetch tags
        run: |
          git fetch --prune --unshallow --tags
          echo exit code $?
          git tag --list

      # Setup python environment
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # Restore the python cache if it exists
      - name: Restore python cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install python dependencies for building compresso
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Clean build artifacts
        run: |
          rm -rf build dist

      # Setup node environment for building compresso's webui
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Build python dist package
      - name: Build python dist package
        id: build_py
        run: |
          echo "Short version:"
          python ./setup.py  --quiet --version
          echo "Long version:"
          python ./setup.py  --quiet fullversion
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}/raw/${GITHUB_REF#refs/heads}/"
          sed -i "s|(./docs/|(${REPO_URL:?}/docs/|g" README.md
          python -m build --no-isolation --skip-dependency-check --wheel 2>&1 | tee /tmp/build-wheel.log
          ! grep -q "absent from the \`packages\` configuration" /tmp/build-wheel.log
          python -m build --no-isolation --skip-dependency-check --sdist

      - name: Verify single wheel output
        run: |
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name "*.whl" | sort)
          test "${#wheels[@]}" -eq 1
          printf 'wheel=%s\n' "${wheels[0]}"

      - name: Verify packaged frontend assets
        run: |
          WHEEL_PATH=$(find dist -maxdepth 1 -type f -name "*.whl" | sort | tail -n 1)
          python -m zipfile -l "${WHEEL_PATH}" | grep "compresso/webserver/public/index.html"
          ! python -m zipfile -l "${WHEEL_PATH}" | grep -q "compresso/webserver/frontend/"
          ! python -m zipfile -l "${WHEEL_PATH}" | grep -q "node_modules"

      # Read the python package distribution data (save version to file)
      - name: Read python package distribution data
        id: py_build_data
        run: |
          PY_VERSION=$(python ./setup.py  --quiet --version)
          PY_BDIST_PATH=$(find dist -maxdepth 1 -type f -name "*.whl" | sort | tail -n 1)
          PY_BDIST_FILE=${PY_BDIST_PATH#*/}
          echo "py_version=${PY_VERSION}" >> $GITHUB_OUTPUT
          echo "py_bdist_file=${PY_BDIST_FILE}" >> $GITHUB_OUTPUT
          echo "py_bdist_path=${PY_BDIST_PATH}" >> $GITHUB_OUTPUT
          echo ${PY_VERSION} > dist/VERSION.txt

      # Upload python package distribution data artifact
      - uses: actions/upload-artifact@v7
        with:
          name: compresso-py-dist-data-${{ steps.py_build_data.outputs.py_version }}
          path: dist/

  # ---------------------------------------------------------------------------
  # Docker: build each architecture natively (no QEMU emulation)
  # ---------------------------------------------------------------------------
  docker_prepare:
    name: Prepare Docker metadata
    needs: py_build
    runs-on: ubuntu-latest
    outputs:
      ghcr_image: ${{ steps.prepare.outputs.ghcr_image }}
      docker_hub_image: ${{ steps.prepare.outputs.docker_hub_image }}
      docker_tags: ${{ steps.prepare.outputs.docker_tags }}
      docker_push: ${{ steps.prepare.outputs.docker_push }}
      sha_short: ${{ steps.prepare.outputs.sha_short }}
      service_name: ${{ steps.prepare.outputs.service_name }}
      build_date: ${{ steps.prepare.outputs.docker_build_date }}
      build_arm64: ${{ steps.prepare.outputs.build_arm64 }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts/

      - name: Read version
        id: py_build_data
        run: |
          rm -rf ./dist && mkdir -p ./dist
          find ./artifacts/ -type f -name "*.whl" -exec cp {} ./dist/ \;
          find ./artifacts/ -type f -name "VERSION.txt" -exec cp {} ./dist/ \;
          PY_VERSION=$(cat ./dist/VERSION.txt)
          echo "py_version=${PY_VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare
        id: prepare
        run: |
          VERSION_TAG=${GITHUB_REF#refs/*/}
          SHA_SHORT="${GITHUB_SHA::7}"
          ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PY_VERSION="${{ steps.py_build_data.outputs.py_version }}"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          SERVICE_NAME=compresso
          DOCKER_HUB_IMAGE=docker.io/jtn0123/${SERVICE_NAME:?}
          GHCR_IMAGE=ghcr.io/${ORG:?}/${SERVICE_NAME:?}

          DOCKER_TAGS=""
          BUILD_ARM64="false"
          if [[ ${GITHUB_REF} == refs/heads/master ]]; then
            DOCKER_TAGS="${DOCKER_TAGS}${DOCKER_HUB_IMAGE}:latest,${GHCR_IMAGE}:latest,"
            if [[ -n ${PY_VERSION} ]]; then
              DOCKER_TAGS="${DOCKER_TAGS}${DOCKER_HUB_IMAGE}:${PY_VERSION},${GHCR_IMAGE}:${PY_VERSION},"
            fi
            BUILD_ARM64="true"
          elif [[ ${GITHUB_REF} == refs/heads/staging ]]; then
            DOCKER_TAGS="${DOCKER_TAGS}${DOCKER_HUB_IMAGE}:staging,${GHCR_IMAGE}:staging,"
            BUILD_ARM64="true"
          elif [[ ${GITHUB_REF} == refs/heads/dev-* ]]; then
            DOCKER_TAGS="${DOCKER_TAGS}${DOCKER_HUB_IMAGE}:${VERSION_TAG},${GHCR_IMAGE}:${VERSION_TAG},"
          elif [[ ${GITHUB_REF} == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            if [[ ${VERSION} =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}[-\w]*$ ]]; then
              DOCKER_TAGS="${DOCKER_TAGS}${DOCKER_HUB_IMAGE}:${VERSION},${GHCR_IMAGE}:${VERSION},"
              DOCKER_TAGS="${DOCKER_TAGS}${DOCKER_HUB_IMAGE}:latest,${GHCR_IMAGE}:latest,"
            fi
            BUILD_ARM64="true"
          elif [[ ${GITHUB_REF} == refs/pull/* ]]; then
            PR_NUMBER=$(echo ${GITHUB_REF} | cut -d'/' -f3)
            DOCKER_TAGS="${GHCR_IMAGE}:pr-${PR_NUMBER},"
          fi

          DOCKER_PUSH="true"
          if [[ ${DOCKER_HUB_IMAGE} != 'docker.io/jtn0123/compresso' ]]; then
            DOCKER_PUSH="false"
          fi

          echo "docker_hub_image=${DOCKER_HUB_IMAGE}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE_NAME}" >> $GITHUB_OUTPUT
          echo "docker_tags=$(echo ${DOCKER_TAGS} | sed 's/,$//')" >> $GITHUB_OUTPUT
          echo "docker_push=${DOCKER_PUSH}" >> $GITHUB_OUTPUT
          echo "docker_build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "build_arm64=${BUILD_ARM64}" >> $GITHUB_OUTPUT

  build_docker_amd64:
    name: Build Docker (amd64)
    needs: docker_prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts/

      - name: Restore dist
        run: |
          rm -rf ./dist && mkdir -p ./dist
          find ./artifacts/ -type f -name "*.whl" -exec cp {} ./dist/ \;
          find ./artifacts/ -type f -name "VERSION.txt" -exec cp {} ./dist/ \;

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ needs.docker_prepare.outputs.ghcr_image }}:build-amd64-${{ github.sha }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,scope=docker-amd64,mode=max

      # Smoke test on the amd64 image
      - name: Build local smoke-test image
        run: docker build -f docker/Dockerfile -t compresso-smoke:ci .

      - name: Smoke test Docker runtime
        run: |
          set -euo pipefail
          tmp_root=$(mktemp -d)
          mkdir -p "${tmp_root}/config" "${tmp_root}/library" "${tmp_root}/cache"
          docker run -d --rm --name compresso-smoke \
            -p 8888:8888 \
            -e PUID=$(id -u) \
            -e PGID=$(id -g) \
            -v "${tmp_root}/config:/config" \
            -v "${tmp_root}/library:/library" \
            -v "${tmp_root}/cache:/tmp/compresso" \
            compresso-smoke:ci

          cleanup() {
            docker logs --tail 200 compresso-smoke || true
            docker rm -f compresso-smoke >/dev/null 2>&1 || true
            rm -rf "${tmp_root}"
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8888/compresso/api/v2/healthcheck/readiness >/tmp/compresso-readiness.json; then
              break
            fi
            sleep 2
          done

          grep -q '"ready": true' /tmp/compresso-readiness.json
          curl -fsSL -o /tmp/compresso-root.html http://127.0.0.1:8888/
          grep -q STARTUP_SUMMARY "${tmp_root}/config/.compresso/logs/compresso.log"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: compresso-smoke:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  build_docker_arm64:
    name: Build Docker (arm64)
    needs: docker_prepare
    if: needs.docker_prepare.outputs.build_arm64 == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts/

      - name: Restore dist
        run: |
          rm -rf ./dist && mkdir -p ./dist
          find ./artifacts/ -type f -name "*.whl" -exec cp {} ./dist/ \;
          find ./artifacts/ -type f -name "VERSION.txt" -exec cp {} ./dist/ \;

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ needs.docker_prepare.outputs.ghcr_image }}:build-arm64-${{ github.sha }}
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,scope=docker-arm64,mode=max

  docker_manifest:
    name: Create Docker manifest
    needs: [docker_prepare, build_docker_amd64, build_docker_arm64]
    if: always() && needs.build_docker_amd64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log into GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into Docker Hub
        if: startsWith(github.ref, 'refs/heads/') || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push manifests
        run: |
          set -euo pipefail
          GHCR_IMAGE="${{ needs.docker_prepare.outputs.ghcr_image }}"
          AMD64_IMG="${GHCR_IMAGE}:build-amd64-${{ github.sha }}"
          ARM64_IMG="${GHCR_IMAGE}:build-arm64-${{ github.sha }}"
          DOCKER_TAGS="${{ needs.docker_prepare.outputs.docker_tags }}"
          DOCKER_PUSH="${{ needs.docker_prepare.outputs.docker_push }}"

          # Determine which images are available
          IMAGES="${AMD64_IMG}"
          if [[ "${{ needs.build_docker_arm64.result }}" == "success" ]]; then
            IMAGES="${IMAGES} ${ARM64_IMG}"
          fi

          # Create manifest for each tag
          IFS=',' read -ra TAGS <<< "${DOCKER_TAGS}"
          for TAG in "${TAGS[@]}"; do
            TAG=$(echo "${TAG}" | xargs)  # trim whitespace
            [[ -z "${TAG}" ]] && continue
            echo "Creating manifest for ${TAG}"
            docker buildx imagetools create -t "${TAG}" ${IMAGES}
          done

  build_pypi:
    name: Publish package to PyPI
    needs: py_build
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      # Fetch shallow git repository
      - name: Checkout
        uses: actions/checkout@v4

      # Fetch all artifacts
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts/

      # Restore python package distribution data
      - name: Restore python package distribution data
        id: py_build_data
        run: |
          rm -rf ./dist
          mkdir -p ./dist
          find ./artifacts/ -type f -name "*.whl" -exec cp {} ./dist/ \;
          find ./artifacts/ -type f -name "*.tar.gz" -exec cp {} ./dist/ \;
          ls -l ./dist/

      # Push the artifacts to PyPI repo
      - name: Publish distribution package to PyPI
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@master
        with:
          password: ${{ secrets.PYPI_TOKEN }}
