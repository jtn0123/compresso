name: Recover Validated Release Publication

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Failed release run containing the validated artifacts
        required: true
        type: string
      release_sha:
        description: Exact validated release candidate commit
        required: true
        type: string
      release_version:
        description: Validated semantic version without the v prefix
        required: true
        type: string
      release_tag:
        description: Validated version tag
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: recover-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  recover:
    name: Reverify and publish validated release
    runs-on: ubuntu-latest
    env:
      SOURCE_RUN_ID: ${{ inputs.source_run_id }}
      RELEASE_SHA: ${{ inputs.release_sha }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Validate recovery identity and tag
        run: |
          set -euo pipefail
          [[ "${SOURCE_RUN_ID}" =~ ^[0-9]+$ ]]
          [[ "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${RELEASE_VERSION}" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}([.-][0-9A-Za-z.-]+)?$ ]]
          test "${RELEASE_TAG}" = "v${RELEASE_VERSION}"
          test "$(git rev-parse HEAD)" = "${RELEASE_SHA}"
          test "$(tr -d '\r\n' < VERSION)" = "${RELEASE_VERSION}"

          git fetch origin master --tags
          git merge-base --is-ancestor "${RELEASE_SHA}" origin/master
          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            tag_sha=$(git rev-list -n 1 "${RELEASE_TAG}")
            test "${tag_sha}" = "${RELEASE_SHA}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" "${RELEASE_SHA}" -m "${RELEASE_TAG}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Download artifacts from failed release run
        run: |
          set -euo pipefail
          mkdir -p release-candidate release-dist release-sboms
          gh run download "${SOURCE_RUN_ID}" \
            --name "release-candidate-${SOURCE_RUN_ID}" \
            --dir release-candidate
          gh run download "${SOURCE_RUN_ID}" \
            --name "compresso-py-dist-data-${RELEASE_VERSION}" \
            --dir release-dist
          gh run download "${SOURCE_RUN_ID}" \
            --name "sbom-amd64-${RELEASE_SHA}" \
            --dir release-sboms
          gh run download "${SOURCE_RUN_ID}" \
            --name "sbom-arm64-${RELEASE_SHA}" \
            --dir release-sboms

      - name: Reverify exact source and artifacts
        run: |
          set -euo pipefail
          python scripts/verify-release-integrity.py \
            --expected-version "${RELEASE_VERSION}" \
            --expected-sha "${RELEASE_SHA}" \
            --actual-sha "$(git rev-parse HEAD)" \
            --dist-dir release-dist \
            --notes-file release-candidate/release-notes.md

          find release-dist release-sboms -type f -print0 | sort -z | \
            xargs -0 sha256sum > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Create or verify draft GitHub Release
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            mkdir -p published-assets
            gh release download "${RELEASE_TAG}" --dir published-assets
            while IFS= read -r artifact; do
              published="published-assets/$(basename "${artifact}")"
              test -f "${published}"
              cmp --silent "${artifact}" "${published}"
            done < <(find release-dist release-sboms -type f | sort; echo SHA256SUMS)
          else
            mapfile -t assets < <(find release-dist release-sboms -type f | sort)
            assets+=(SHA256SUMS)
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --verify-tag \
              --draft \
              --title "${RELEASE_TAG}" \
              --notes-file release-candidate/release-notes.md
          fi

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish validated GHCR manifests
        run: |
          set -euo pipefail
          org=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${org}/compresso"
          images=(
            "${image}:build-amd64-${RELEASE_SHA}"
            "${image}:build-arm64-${RELEASE_SHA}"
          )
          docker buildx imagetools inspect "${images[0]}"
          docker buildx imagetools inspect "${images[1]}"
          docker buildx imagetools create -t "${image}:${RELEASE_VERSION}" "${images[@]}"
          docker buildx imagetools create -t "${image}:latest" "${images[@]}"
          docker buildx imagetools inspect "${image}:${RELEASE_VERSION}"
          docker buildx imagetools inspect "${image}:latest"

      - name: Publish GitHub Release and remove candidate branch
        run: |
          gh release edit "${RELEASE_TAG}" --draft=false
          git push origin --delete "release-candidate/${SOURCE_RUN_ID}" || \
            echo "::warning::Release published, but the candidate branch could not be removed"
