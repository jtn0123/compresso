[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unittest: Unit tests.",
    "integrationtest: Integration tests.",
    "benchmark: Performance benchmark tests.",
]
filterwarnings = [
    "ignore:.*invalid escape sequence.*:DeprecationWarning",
]

[tool.coverage.run]
relative_files = true
source = ["compresso"]
omit = ["*/tests/*", "*/test_*", "*/webserver/frontend/*"]

[tool.coverage.report]
show_missing = true
fail_under = 30

[tool.ruff]
line-length = 127
target-version = "py313"
exclude = [
    "venv", ".venv", ".idea", "dev_environment", "dist", "build",
    "compresso/webserver/frontend",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "PIE", "B", "S", "SIM", "T20", "C90"]
ignore = [
    "E241",  # multiple spaces before operator — used for alignment
    "F402",  # import shadowed by loop variable — false positive on common patterns
    "F403",  # wildcard imports — used in __init__.py and basemodel
    "F405",  # undefined from wildcard — consequence of F403
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["S101", "S108", "S311"]
"tests/unit/test_unffmpeg_types.py" = ["E402"]
"compresso/libs/unplugins/pluginscli.py" = ["T201"]

[tool.ruff.lint.mccabe]
max-complexity = 20

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = [
    "compresso/webserver/frontend",
    "venv",
    ".venv",
    "dist",
    "build",
]
