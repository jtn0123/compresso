[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unittest: Unit tests.",
    "integrationtest: Integration tests.",
    "benchmark: Performance benchmark tests.",
]
filterwarnings = [
    "ignore:.*invalid escape sequence.*:DeprecationWarning",
    "ignore:The `ordered` `class Meta` option is deprecated.*:marshmallow.warnings.RemovedInMarshmallow4Warning",
    "ignore:Passing field metadata as keyword arguments is deprecated.*:marshmallow.warnings.RemovedInMarshmallow4Warning",
]

[tool.coverage.run]
relative_files = true
source = ["unmanic"]
omit = ["*/tests/*", "*/test_*", "*/webserver/frontend/*"]

[tool.coverage.report]
show_missing = true
fail_under = 30

[tool.ruff]
line-length = 127
target-version = "py38"
exclude = [
    "venv", ".venv", ".idea", "dev_environment", "dist", "build",
    "unmanic/webserver/frontend",
]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E241",  # multiple spaces before operator — used for alignment
    "E501",  # line too long — enforced advisory only (many pre-existing)
    "F402",  # import shadowed by loop variable — false positive on common patterns
    "F403",  # wildcard imports — used in __init__.py and basemodel
    "F405",  # undefined from wildcard — consequence of F403
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = [
    "unmanic/webserver/frontend",
    "venv",
    ".venv",
    "dist",
    "build",
]
