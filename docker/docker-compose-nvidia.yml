################
# Compresso Docker Compose template
#
# Use this template when enabling NVENC Hardware accelerated encoding
#
# WARNING — hardware encoding is a LAST RESORT if your goal is smaller files.
# NVENC encoders are faster but produce LARGER files at the same visual
# quality than the default software encoders (libx265 / libsvtav1), which run
# on any CPU (Intel, AMD, Apple Silicon). Use this template only when encode
# speed matters more than storage savings. Hardware *decoding* is
# quality-neutral and unaffected by this caution.
# See docs/ENCODING_GUIDE.md for encoder recommendations.
#
# Variables that will need to be changed:
#     <PUID>                            -  User id for folder/file permissions
#     <PGID>                            -  Group id for folder/file permissions
#     <TZ>                              -  Your time zone, eg - Pacific/Auckland
#     <NVIDIA_VISIBLE_DEVICES>          -  The GPUs that will be accessible to the container
#                                          Options: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/user-guide.html#gpu-enumeration
#     <PATH_TO_CONFIG>                  -  Path where Compresso will store config files
#     <PATH_TO_LIBRARY>                 -  Path where you store the files that Compresso will scan
#     <PATH_TO_ENCODE_CACHE>            -  Cache path for in-progress encoding tasks
#


services:
  compresso:
    container_name: compresso
    image: ghcr.io/jtn0123/compresso:latest
    ports:
      - 127.0.0.1:8888:8888
    environment:
      - ui_address=0.0.0.0
      - PUID=<PUID>
      - PGID=<PGID>
      - TZ=<TZ>
      - NVIDIA_VISIBLE_DEVICES=<NVIDIA_VISIBLE_DEVICES>
    volumes:
      - <PATH_TO_CONFIG>:/config
      - <PATH_TO_LIBRARY>:/library
      - <PATH_TO_ENCODE_CACHE>:/tmp/compresso
    runtime: nvidia       # For H/W transcoding using the NVENC encoder
